name: Dependency Audit

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Export locked dependencies
        run: uv export --frozen --no-dev --format requirements-txt --output-file requirements.audit.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run vulnerability audit
        run: pip-audit -r requirements.audit.txt
