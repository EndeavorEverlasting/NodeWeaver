version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: topicsense_postgres
    environment:
      POSTGRES_DB: topicsense
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    command: postgres -c shared_preload_libraries=vector -c max_connections=200 -c shared_buffers=256MB
    networks:
      - topicsense_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d topicsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: topicsense_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - topicsense_network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # TopicSense API application
  topicsense_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: topicsense_api
    environment:
      # Database configuration
      DATABASE_URL: postgresql://rag_user:rag_pass@postgres:5432/topicsense
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: rag_user
      PGPASSWORD: rag_pass
      PGDATABASE: topicsense
      
      # Redis configuration
      REDIS_URL: redis://redis:6379/0
      
      # Application configuration
      SESSION_SECRET: your-super-secret-key-change-in-production
      FLASK_ENV: production
      FLASK_DEBUG: "false"
      
      # RAG Engine configuration
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      VECTOR_DIMENSION: 384
      CONVERGENCE_THRESHOLD: 0.7
      MIN_CLUSTER_SIZE: 3
      COHERENCE_THRESHOLD: 0.6
      MAX_INPUT_LENGTH: 10000
      
      # Logging
      LOG_LEVEL: INFO
      
      # API configuration
      API_VERSION: v1
      
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models  # For caching downloaded models
    networks:
      - topicsense_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/categories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: topicsense_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates
      - nginx_logs:/var/log/nginx
    networks:
      - topicsense_network
    depends_on:
      - topicsense_api
    restart: unless-stopped
    profiles:
      - production  # Only start in production profile

  # Database backup service
  backup:
    image: postgres:15
    container_name: topicsense_backup
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: rag_user
      PGPASSWORD: rag_pass
      PGDATABASE: topicsense
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - topicsense_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - backup  # Only start when explicitly requested
    command: /backup.sh

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  topicsense_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
